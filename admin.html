<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin dashboard to manage portfolio projects and blog posts." />
  <title>Admin Dashboard | Saurav Mourya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="section">
    <section class="container" id="login-view">
      <div class="card admin-auth">
        <h1 class="page-title" style="margin-top:0;">Admin Login</h1>
        <p class="section-subtitle">Enter admin password to access dashboard.</p>
        <form id="login-form">
          <input type="password" id="admin-password" placeholder="Enter admin password" required />
          <button class="btn btn-primary" type="submit">Unlock Dashboard</button>
        </form>
      </div>
    </section>

    <section class="container hidden" id="admin-view">
      <h1 class="page-title">Admin Dashboard</h1>
      <p class="section-subtitle">Manage projects/blog without source editing and publish globally using GitHub API.</p>

      <div class="admin-toolbar card">
        <p class="muted">All edits are saved as draft locally. Click Publish to sync to all devices.</p>
        <button id="reset-data" class="btn btn-secondary" type="button">Reset Draft</button>
      </div>

      <section class="card admin-section" style="margin-bottom: 1rem;">
        <h2 class="section-title">Publish Settings</h2>
        <form id="publish-form">
          <input name="owner" placeholder="GitHub owner (e.g. sauravmourya54)" required />
          <input name="repo" placeholder="Repository name" required />
          <input name="branch" placeholder="Branch (e.g. main)" value="main" required />
          <input name="token" type="password" placeholder="GitHub Personal Access Token" required />
          <button class="btn btn-primary" type="button" id="publish-btn">Publish to GitHub</button>
        </form>
      </section>

      <div class="admin-grid">
        <section class="card admin-section">
          <h2 class="section-title">Manage Projects</h2>
          <form id="project-form">
            <input type="text" name="title" placeholder="Project title" required>
            <textarea name="description" placeholder="Short project description" required></textarea>
            <input type="text" name="tech" placeholder="Tech stack (comma separated)" required>
            <input type="url" name="image" placeholder="Thumbnail image URL" required>
            <input type="url" name="demo" placeholder="Live demo link" required>
            <input type="url" name="source" placeholder="Read blog link" required>
            <button class="btn btn-primary" type="submit" id="project-submit-btn">Add Project</button>
          </form>
          <div id="project-list" class="admin-list"></div>
        </section>

        <section class="card admin-section">
          <h2 class="section-title">Manage Blog Posts</h2>
          <form id="blog-form">
            <input type="text" name="title" placeholder="Post title" required>
            <input type="text" name="date" placeholder="Date (e.g. March 24, 2026)" required>
            <input type="url" name="image" placeholder="Blog cover image URL (optional)">
            <textarea name="excerpt" placeholder="Small description / excerpt" required></textarea>
            <textarea name="content" placeholder="Full blog content for Read More page" required></textarea>
            <button class="btn btn-primary" type="submit" id="blog-submit-btn">Add Post</button>
          </form>
          <div id="blog-list" class="admin-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="admin.js"></script>
  <script>initPortfolioPage({ activePage: "" });</script>
</body>
</html>
